server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: external-api-foundation
  profiles:
    active: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: DemoHikariCP
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  data:
    redis:
      timeout: 3s

mybatis-plus:
  mapper-locations: classpath*:com/example/externalapi/mapper/**/*.xml
  type-aliases-package: com.example.externalapi.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  jwt:
    enabled: true
    issuer: demo-service
    include-paths:
      - "/**"
    exclude-paths:
      - "/auth/login"
      - "/auth/token/test"
      - "/doc.html"
      - "/webjars/**"
      - "/v3/api-docs/**"
      - "/swagger-ui/**"
      - "/swagger-ui.html"
      - "/actuator/health"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/error"

  log:
    begin-enabled: true
    request-body-enabled: true
    response-body-enabled: true
    plain-crypto-body-enabled: false
    max-body-length: 3000
    exclude-paths:
      - "/actuator/**"
      - "/doc.html"
      - "/webjars/**"
      - "/v3/api-docs/**"
      - "/swagger-ui/**"
      - "/swagger-ui.html"
      - "/files/**"

  distributed-lock:
    enabled: true
    default-wait-time-seconds: 3
    default-lease-time-seconds: 10

  repeat-submit:
    enabled: true
    default-seconds: 5

  scheduler:
    enabled: true
    pool-size: 4
    thread-name-prefix: demo-scheduler-
    await-termination-seconds: 30

  http-client:
    connect-timeout-millis: 3000
    read-timeout-millis: 10000
    user-agent: external-api-foundation
    log-enabled: true
    max-log-body-length: 2000

  task:
    local-serial-demo:
      enabled: false
      fixed-delay: 5000
    distributed-serial-demo:
      enabled: false
      fixed-delay: 5000

  security:
    replay:
      enabled: false
      timestamp-window-seconds: 300
      signature-algorithm: HMAC_SHA256
      include-paths:
        - "/api/external/**"
      exclude-paths:
        - "/auth/login"
        - "/doc.html"
        - "/v3/api-docs/**"
        - "/actuator/health"

  crypto:
    enabled: false
    request-decrypt:
      enabled: true
      include-paths:
        - "/**"
      exclude-paths:
        - "/auth/login"
        - "/auth/token/test"
        - "/doc.html"
        - "/webjars/**"
        - "/v3/api-docs/**"
        - "/swagger-ui/**"
        - "/swagger-ui.html"
        - "/actuator/**"
        - "/error"
    response-encrypt:
      enabled: true
      include-paths:
        - "/**"
      exclude-paths:
        - "/auth/login"
        - "/auth/token/test"
        - "/doc.html"
        - "/webjars/**"
        - "/v3/api-docs/**"
        - "/swagger-ui/**"
        - "/swagger-ui.html"
        - "/actuator/**"
        - "/error"
